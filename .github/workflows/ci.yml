name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contest-platform
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: contest-platform/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contest-platform
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: contest-platform/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend run prisma:generate
      - run: pnpm --filter backend run type-check
      - run: pnpm --filter frontend run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contest-platform
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: contest-platform/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend run prisma:generate
      - run: pnpm --filter backend exec jest -- --config jest.config.js --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: contest-platform/backend/coverage/

  build:
    name: Build
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contest-platform
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: contest-platform/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter backend run prisma:generate
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: contest-platform/backend/dist/
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: contest-platform/frontend/dist/

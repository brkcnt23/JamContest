<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JamContest</title>
    <style>
      /* Block theme FOUC — set bg before Vue CSS bundle loads */
      html.dark body { background: #141414; }
      html.light body { background: #fff; }
      html:not(.dark):not(.light) body { background: #fff; }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

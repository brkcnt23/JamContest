version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: contest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contest
      POSTGRES_PASSWORD: contest
      POSTGRES_DB: contest_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contest -d contest_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: contest-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://contest:contest@postgres:5432/contest_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: 8000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM:-noreply@jamcontest.com}
      UPLOAD_PATH: ./uploads
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: contest-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
